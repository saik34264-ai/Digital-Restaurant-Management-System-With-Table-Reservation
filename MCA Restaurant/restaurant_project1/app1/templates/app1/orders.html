<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>
<body>

<h2>📦 Order History</h2>

{% for order in orders %}
<div style="border:1px solid #ccc; padding:10px; margin:10px;">
    <p><b>Order ID:</b> {{ order.id }}</p>
    <p><b>Total:</b> ₹{{ order.total_price }}</p>
    <p><b>Payment:</b> {{ order.payment_method }}</p>
    <p><b>Status:</b> {{ order.status }}</p>
</div>
{% endfor %}

</body>
</html>
