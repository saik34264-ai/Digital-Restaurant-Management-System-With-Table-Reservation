<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        form {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            width: 95%;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        img {
            width: 100px;
            margin: 10px;
        }
    </style>
</head>
<body>

<h1>Edit Food Item</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="name" value="{{ item.name }}" placeholder="Item Name" required>

    <input type="number" name="price" value="{{ item.price }}" placeholder="Price" required>

    <select name="category">
        <option {% if item.category == "Biryani" %}selected{% endif %}>Biryani</option>
        <option {% if item.category == "Pizza" %}selected{% endif %}>Pizza</option>
        <option {% if item.category == "Juice" %}selected{% endif %}>Juice</option>
        <option {% if item.category == "Rice" %}selected{% endif %}>Rice</option>
    </select>

    <p>Current Image:</p>
    <img src="{{ item.image.url }}">

    <input type="file" name="image">

    <button type="submit">Update Item</button>
</form>

</body>
</html>
