
<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        .box {
            background: white;
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: green;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff4b2b;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🎉 Order Placed Successfully!</h1>
    <p>Thank you for your order ❤️</p>

    <a href="{% url 'menu' %}" class="btn">Back to Menu</a>
</div>

</body>
</html>
