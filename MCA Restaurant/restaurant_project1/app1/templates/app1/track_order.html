<!-- track_order.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    min-height:100vh;
    padding:40px 20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#ffffff;
    border-radius:18px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,0.18);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:30px;
    font-size:38px;
}

.order-card{
    background:#f8f8f8;
    border-left:8px solid #ff5e62;
    padding:20px;
    border-radius:12px;
    margin-bottom:18px;
    transition:0.3s;
}

.order-card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 18px rgba(0,0,0,0.12);
}

.food-name{
    font-size:24px;
    font-weight:700;
    color:#222;
    margin-bottom:10px;
}

.info{
    font-size:17px;
    color:#555;
    margin-bottom:6px;
}

.status{
    display:inline-block;
    margin-top:10px;
    padding:8px 16px;
    border-radius:25px;
    font-weight:bold;
    font-size:15px;
    color:white;
}

/* Different Status Colors */

.Pending{
    background:#f39c12;
}

.Preparing{
    background:#3498db;
}

.Ready{
    background:#2ecc71;
}

.Served{
    background:#9b59b6;
}

.empty{
    text-align:center;
    font-size:20px;
    color:#666;
    padding:30px;
}

.home-btn{
    display:block;
    width:220px;
    margin:30px auto 0;
    text-align:center;
    text-decoration:none;
    background:#ff5e62;
    color:white;
    padding:14px;
    border-radius:10px;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

.home-btn:hover{
    background:#e5484d;
}

</style>
</head>

<body>

<div class="container">

<h1> Track Your Order</h1>

{% if orders %}

    {% for order in orders %}

    <div class="order-card">

        <div class="food-name">{{ order.food_name }}</div>

        <div class="info">Quantity : {{ order.quantity }}</div>

        <span class="status {{ order.status }}">
            {{ order.status }}
        </span>

    </div>

    {% endfor %}

{% else %}

<div class="empty">No Orders Found</div>

{% endif %}

<a href="/" class="home-btn"> Back to Home</a>

</div>

</body>
</html>
